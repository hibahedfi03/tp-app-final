name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t spring-app \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest \
            ./springboot/app

      - name: Build frontend image
        run: |
          docker build \
            -t angular-app \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest \
            ./angular-app

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Test application with Docker Compose
        run: |
          docker compose up -d
          docker compose ps

          PROJECT="$(basename "$GITHUB_WORKSPACE")"
          NETWORK="${PROJECT}_default"
          echo "Network: $NETWORK"

          echo "Backend logs (first 80 lines):"
          docker compose logs --no-color --tail=80 spring-boot-app || true

          echo "Wait for backend port inside docker network..."
          for i in {1..90}; do
            if docker run --rm --network "$NETWORK" busybox sh -c "nc -z -w 2 spring-boot-app 8081"; then
              echo "Backend listens on 8081"
              BACKEND_PORT=8081
              break
            fi
            if docker run --rm --network "$NETWORK" busybox sh -c "nc -z -w 2 spring-boot-app 8080"; then
              echo "Backend listens on 8080"
              BACKEND_PORT=8080
              break
            fi
            echo "Not ready ($i/90)..."
            sleep 2
          done

          if [ -z "${BACKEND_PORT:-}" ]; then
            echo "Backend never opened 8080/8081. Full logs:"
            docker compose logs --no-color spring-boot-app
            exit 1
          fi

          echo "HTTP check backend..."
          docker run --rm --network "$NETWORK" curlimages/curl:8.5.0 -fsS "http://spring-boot-app:${BACKEND_PORT}/" >/dev/null

          echo "HTTP check frontend..."
          docker run --rm --network "$NETWORK" curlimages/curl:8.5.0 -fsS "http://angular-app:80/" >/dev/null

          echo "SUCCESS"
