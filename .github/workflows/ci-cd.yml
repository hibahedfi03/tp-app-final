name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t spring-app \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest \
            ./springboot/app

      - name: Build frontend image
        run: |
          docker build \
            -t angular-app \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest \
            ./angular-app

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Test application with Docker Compose
        run: |
          docker compose up -d
          docker compose ps

          PROJECT="$(basename "$GITHUB_WORKSPACE")"
          NETWORK="${PROJECT}_default"
          echo "Compose network: $NETWORK"

          echo "Wait for MySQL..."
          for i in {1..60}; do
            if docker run --rm --network "$NETWORK" busybox sh -c "nc -z -w 2 mysql 3306"; then
              echo "MySQL OK"
              break
            fi
            sleep 2
          done

          echo "Wait for backend port (8081 or 8080) on service spring-boot-app..."
          BACKEND_PORT=""
          for i in {1..90}; do
            if docker run --rm --network "$NETWORK" busybox sh -c "nc -z -w 2 spring-boot-app 8081"; then
              BACKEND_PORT="8081"
              break
            fi
            if docker run --rm --network "$NETWORK" busybox sh -c "nc -z -w 2 spring-boot-app 8080"; then
              BACKEND_PORT="8080"
              break
            fi
            sleep 2
          done

          if [ -z "$BACKEND_PORT" ]; then
            echo "Backend not listening on 8080/8081. Printing logs:"
            docker compose logs --no-color spring-boot-app
            exit 1
          fi
          echo "Backend listens on $BACKEND_PORT"

          echo "HTTP check backend..."
          CODE=$(docker run --rm --network "$NETWORK" curlimages/curl:8.5.0 -s -o /dev/null -w "%{http_code}" "http://spring-boot-app:${BACKEND_PORT}/" || true)
          echo "Backend HTTP code: $CODE"
          if [ "$CODE" = "000" ]; then
            docker compose logs --no-color spring-boot-app
            exit 1
          fi

          echo "HTTP check frontend..."
          FCODE=$(docker run --rm --network "$NETWORK" curlimages/curl:8.5.0 -s -o /dev/null -w "%{http_code}" "http://angular-app:80/" || true)
          echo "Frontend HTTP code: $FCODE"
          if [ "$FCODE" = "000" ]; then
            docker compose logs --no-color angular-app
            exit 1
          fi

          echo "SUCCESS: services reachable inside compose network."
